<!doctype html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Corridor - Full Graphics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap');

        .jacquard-12-regular {
            font-family: "Jacquard 12", system-ui;
        }

        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
    </style>
</head>
<body>

<main id="menu" class="relative h-screen w-screen overflow-hidden">
    <img src="storage/welcome/welcomePage.png" alt="monster" class="w-full h-full object-cover">

    <div class="absolute inset-0 flex items-center justify-center">
        <div class="relative flex items-center justify-center">
            <img src="storage/welcome/panel.png" class="h-[600px] w-[800px]" alt="panel"/>

            <div class="absolute top-20 inset-0 flex flex-col items-center justify-center">
                <h1 class="text-7xl text-red-800 jacquard-12-regular leading-none text-center mb-[-200px]">
                    Death <br> Corridor
                </h1>

                <a href="#" id="start-btn" class="group relative flex items-center justify-center active:scale-95 no-underline">
                    <img src="storage/welcome/buttonStart.png" alt="Start" class="w-[350px]">
                    <span class="absolute jacquard-12-regular text-5xl text-red-800 mb-[-20px]">Start</span>
                </a>
            </div>
        </div>
    </div>
</main>

<div id="game-container"></div>

<script src="game.js">

</script>
</body>
</html>
